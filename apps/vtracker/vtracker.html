<!--  apps/vtracker/vtracker.html  -->
<div class="window hidden" id="vtracker-window">
  <div class="title-bar">
    <div class="title-text">vTRACKER</div>
    <div class="window-controls">
      <button class="minimize-btn" title="Minimize">_</button>
      <button class="close-btn"    title="Close">x</button>
    </div>
  </div>

  <div class="vt-shell">

    <!-- ══ TOP BAR ══════════════════════════════════════════════ -->
    <div class="vt-topbar" id="vt-topbar">

      <!-- Transport -->
      <div class="vt-transport">
        <button class="vt-btn vt-play-btn"  id="vt-play">▶ PLAY</button>
        <button class="vt-btn vt-pat-btn"   id="vt-play-pat">▷ PATT</button>
        <button class="vt-btn vt-stop-btn"  id="vt-stop">■ STOP</button>
      </div>

      <div class="vt-sep"></div>

      <!-- BPM / Speed -->
      <div class="vt-field-grp">
        <span class="vt-lbl">BPM</span>
        <button class="vt-nudge" id="vt-bpm-dn">−</button>
        <span class="vt-numval" id="vt-bpm-val">125</span>
        <button class="vt-nudge" id="vt-bpm-up">+</button>
      </div>
      <div class="vt-field-grp">
        <span class="vt-lbl">SPD</span>
        <button class="vt-nudge" id="vt-spd-dn">−</button>
        <span class="vt-numval" id="vt-spd-val">6</span>
        <button class="vt-nudge" id="vt-spd-up">+</button>
      </div>

      <div class="vt-sep"></div>

      <!-- Octave + step -->
      <div class="vt-field-grp">
        <span class="vt-lbl">OCT</span>
        <button class="vt-nudge" id="vt-oct-dn">−</button>
        <span class="vt-numval" id="vt-oct-val">4</span>
        <button class="vt-nudge" id="vt-oct-up">+</button>
      </div>
      <div class="vt-field-grp">
        <span class="vt-lbl">STEP</span>
        <button class="vt-nudge" id="vt-step-dn">−</button>
        <span class="vt-numval" id="vt-step-val">1</span>
        <button class="vt-nudge" id="vt-step-up">+</button>
      </div>

      <div class="vt-sep"></div>

      <!-- Pattern -->
      <div class="vt-field-grp">
        <span class="vt-lbl">PAT</span>
        <button class="vt-nudge" id="vt-pat-dn">−</button>
        <span class="vt-numval" id="vt-pat-val">00</span>
        <button class="vt-nudge" id="vt-pat-up">+</button>
      </div>
      <div class="vt-field-grp">
        <span class="vt-lbl">ROWS</span>
        <select class="vt-sel" id="vt-rows-sel">
          <option value="16">16</option>
          <option value="32">32</option>
          <option value="64" selected>64</option>
          <option value="128">128</option>
        </select>
      </div>

      <div class="vt-tspacer"></div>

      <!-- Position indicator -->
      <span class="vt-pos" id="vt-pos">ROW:00 ORD:00</span>

      <div class="vt-sep"></div>

      <!-- Save/Load -->
      <button class="vt-btn" id="vt-save">SAVE</button>
      <button class="vt-btn" id="vt-load-btn">LOAD</button>
      <input type="file" id="vt-load-file" accept=".vtk,.json" style="display:none">
    </div>

    <!-- ══ TABS ══════════════════════════════════════════════════ -->
    <div class="vt-tabs" id="vt-tabs">
      <button class="vt-tab active" data-tab="pattern">PATTERN</button>
      <button class="vt-tab"        data-tab="song">SONG</button>
      <button class="vt-tab"        data-tab="samples">SAMPLES</button>
    </div>

    <!-- ══ MAIN AREA ════════════════════════════════════════════ -->
    <div class="vt-main" id="vt-main">

      <!-- ── TAB: PATTERN ─────────────────────────────────────── -->
      <div class="vt-panel active" id="vt-panel-pattern">
        <div class="vt-pattern-wrap">
          <!-- Channel headers -->
          <div class="vt-ch-headers" id="vt-ch-headers">
            <div class="vt-row-gutter"></div>
            <!-- injected by JS -->
          </div>
          <!-- Oscilloscope strip (one canvas per channel) -->
          <div class="vt-scope-strip" id="vt-scope-strip">
            <div class="vt-scope-gutter"></div>
            <!-- canvases injected by JS -->
          </div>
          <!-- Scrollable grid -->
          <div class="vt-grid-scroll" id="vt-grid-scroll">
            <div class="vt-grid" id="vt-grid">
              <!-- rows injected by JS -->
            </div>
          </div>
        </div>
      </div>

      <!-- ── TAB: SONG ─────────────────────────────────────────── -->
      <div class="vt-panel" id="vt-panel-song">
        <div class="vt-song-wrap">
          <div class="vt-song-left">
            <div class="vt-song-hdr">
              <span class="vt-lbl">ORDER LIST</span>
              <button class="vt-btn" id="vt-ord-add">+</button>
              <button class="vt-btn" id="vt-ord-del">−</button>
              <button class="vt-btn" id="vt-ord-dup">DUP</button>
            </div>
            <div class="vt-orderlist" id="vt-orderlist">
              <!-- injected -->
            </div>
          </div>
          <div class="vt-song-right">
            <div class="vt-song-hdr">
              <span class="vt-lbl">PATTERNS</span>
              <button class="vt-btn" id="vt-newpat">NEW PAT</button>
              <button class="vt-btn" id="vt-clonepat">CLONE</button>
              <button class="vt-btn" id="vt-delpat">DELETE</button>
            </div>
            <div class="vt-patlist" id="vt-patlist">
              <!-- injected -->
            </div>
          </div>
        </div>
      </div>

      <!-- ── TAB: SAMPLES ──────────────────────────────────────── -->
      <div class="vt-panel" id="vt-panel-samples">
        <div class="vt-samples-wrap">
          <!-- Sample slot list -->
          <div class="vt-sample-list" id="vt-sample-list">
            <!-- injected -->
          </div>
          <!-- Sample editor (right side) -->
          <div class="vt-sample-editor" id="vt-sample-editor">
            <div class="vt-sample-editor-empty">← SELECT A SAMPLE SLOT</div>
          </div>
        </div>
      </div>

    </div><!-- /vt-main -->

    <!-- Status bar -->
    <div class="vt-statusbar" id="vt-statusbar">
      <span id="vt-status-msg">READY.</span>
      <span class="vt-status-keys">Z-M/Q-U=NOTES · ARROWS=MOVE · DEL=CLEAR · SPACE=PLAY · F1-F8=CHANNEL</span>
    </div>

  </div><!-- /vt-shell -->
</div>
